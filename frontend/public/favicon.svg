<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle - deep navy -->
  <circle cx="24" cy="24" r="23" fill="#0a1c36"/>
  <!-- Halo ring - warm gold -->
  <circle cx="24" cy="18" r="10" fill="none" stroke="#f5bc19" stroke-width="2.2" opacity="0.85"/>
  <!-- Inner halo glow -->
  <circle cx="24" cy="18" r="8.5" fill="none" stroke="#f5bc19" stroke-width="0.6" opacity="0.4"/>
  <!-- Cross - gold, centered -->
  <!-- Vertical bar -->
  <rect x="22.25" y="10" width="3.5" height="28" rx="1.2" fill="#d4af37"/>
  <!-- Horizontal bar -->
  <rect x="14" y="18" width="20" height="3.5" rx="1.2" fill="#d4af37"/>
  <!-- Subtle outer ring -->
  <circle cx="24" cy="24" r="23" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
</svg>